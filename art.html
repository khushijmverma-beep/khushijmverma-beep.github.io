<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Art — Khushi Verma</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Georgia', serif;
      background: #0d0d0d;
      color: #eee;
      min-height: 100vh;
    }

    nav {
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #333;
    }
    nav .logo { font-size: 1.1rem; color: #c9a96e; font-style: italic; }
    nav a { text-decoration: none; color: #aaa; font-size: 0.9rem; }
    nav a:hover { color: #c9a96e; }

    .hero {
      text-align: center;
      padding: 80px 20px 40px;
    }
    .hero h1 {
      font-size: 3.5rem;
      font-weight: 400;
      font-style: italic;
      color: #c9a96e;
      letter-spacing: 4px;
    }
    .hero p {
      margin-top: 16px;
      color: #888;
      font-size: 1.05rem;
      max-width: 500px;
      margin-inline: auto;
      line-height: 1.8;
    }

    /* CAROUSEL */
    .carousel-section {
      padding: 40px 20px 80px;
      text-align: center;
    }

    .carousel-container {
      position: relative;
      max-width: 700px;
      margin: auto;
    }

    .carousel-slide {
      display: none;
      animation: fadein 0.5s ease;
    }

    .carousel-slide.active {
      display: block;
    }

    @keyframes fadein {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .carousel-slide img {
      width: 100%;
      max-height: 600px;
      object-fit: contain;
      border: 1px solid #c9a96e33;
      border-radius: 4px;
    }

    .carousel-counter {
      margin-top: 16px;
      color: #666;
      font-size: 0.85rem;
      letter-spacing: 2px;
    }

    .carousel-controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 24px;
      margin-top: 24px;
    }

    .carousel-btn {
      background: transparent;
      border: 1px solid #c9a96e;
      color: #c9a96e;
      padding: 10px 28px;
      border-radius: 2px;
      cursor: pointer;
      font-size: 0.9rem;
      letter-spacing: 2px;
      transition: all 0.2s;
      font-family: 'Georgia', serif;
    }

    .carousel-btn:hover {
      background: #c9a96e;
      color: #0d0d0d;
    }

    /* DOTS */
    .dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #333;
      cursor: pointer;
      transition: background 0.2s;
    }

    .dot.active { background: #c9a96e; }

    footer {
      text-align: center;
      padding: 24px;
      color: #444;
      font-size: 0.85rem;
      border-top: 1px solid #222;
    }
    footer a { color: #c9a96e; text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <nav>
    <div class="logo">Khushi Verma — Art</div>
    <a href="index.html">← Back to Portfolio</a>
  </nav>

  <section class="hero">
    <h1>Art Portfolio</h1>
    <p>A collection of creative works — illustrations, paintings, and visual explorations.</p>
  </section>

  <section class="carousel-section">
    <div class="carousel-container">

        <div class="carousel-slide active"><img src="Images/Image37.jpeg" alt="Artwork 37" /></div>
        <div class="carousel-slide"><img src="Images/Image36.jpg" alt="Artwork 36" /></div>
        <div class="carousel-slide"><img src="Images/Image35.jpg" alt="Artwork 35" /></div>
        <div class="carousel-slide"><img src="Images/Image32.jpg" alt="Artwork 32" /></div>
        <div class="carousel-slide"><img src="Images/Image31.jpg" alt="Artwork 31" /></div>
        <div class="carousel-slide"><img src="Images/Image30.jpg" alt="Artwork 30" /></div>
        <div class="carousel-slide"><img src="Images/Image29.jpg" alt="Artwork 29" /></div>
        <div class="carousel-slide"><img src="Images/Image28.jpg" alt="Artwork 28" /></div>
        <div class="carousel-slide"><img src="Images/Image27.jpg" alt="Artwork 27" /></div>
        <div class="carousel-slide"><img src="Images/Image25.jpg" alt="Artwork 25" /></div>
        <div class="carousel-slide"><img src="Images/Image20.jpg" alt="Artwork 20" /></div>
        <div class="carousel-slide"><img src="Images/Image19.jpg" alt="Artwork 19" /></div>
        <div class="carousel-slide"><img src="Images/Image18.jpg" alt="Artwork 18" /></div>
        <div class="carousel-slide"><img src="Images/Image15.jpg" alt="Artwork 15" /></div>

        <div class="carousel-slide"><img src="Images/Image11.jpg" alt="Artwork 11" /></div>
        <div class="carousel-slide"><img src="Images/Image10.jpg" alt="Artwork 10" /></div>
        <div class="carousel-slide"><img src="Images/Image9.jpg" alt="Artwork 9" /></div>

      <p class="carousel-counter" id="counter">1 / 28</p>

      <div class="carousel-controls">
        <button class="carousel-btn" onclick="changeSlide(-1)">← Prev</button>
        <button class="carousel-btn" onclick="changeSlide(1)">Next →</button>
      </div>

      <div class="dots" id="dots"></div>
    </div>
  </section>

  <footer>
    © 2025 Khushi Verma · <a href="index.html">Back to main portfolio</a>
  </footer>

  <script>
    let current = 0;
    const slides = document.querySelectorAll('.carousel-slide');
    const counter = document.getElementById('counter');
    const dotsContainer = document.getElementById('dots');

    // Create dots
    slides.forEach((_, i) => {
      const dot = document.createElement('div');
      dot.classList.add('dot');
      if (i === 0) dot.classList.add('active');
      dot.onclick = () => goToSlide(i);
      dotsContainer.appendChild(dot);
    });

    function updateCarousel() {
      slides.forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
      slides[current].classList.add('active');
      document.querySelectorAll('.dot')[current].classList.add('active');
      counter.textContent = `${current + 1} / ${slides.length}`;
    }

    function changeSlide(dir) {
      current = (current + dir + slides.length) % slides.length;
      updateCarousel();
    }

    function goToSlide(i) {
      current = i;
      updateCarousel();
    }

    // Keyboard support
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') changeSlide(-1);
      if (e.key === 'ArrowRight') changeSlide(1);
    });
  </script>

</body>
</html>
